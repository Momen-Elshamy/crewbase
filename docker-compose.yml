version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - MONGODB_URI=mongodb://mongo:27017/crewbase
      - NEXTAUTH_SECRET=dev-secret-change-me
      - NEXTAUTH_URL=http://localhost:3000
      - HEARTBEAT_SECRET=dev-heartbeat-secret
    depends_on:
      - mongo
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
